apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ollama
  namespace: pi-swarm
  labels:
    app: ollama
spec:
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        pi-role: inference
      containers:
        - name: ollama
          image: ollama/ollama:0.5.13
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "7Gi"
              cpu: "3000m"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: ollama-data
          hostPath:
            path: /data/ollama
            type: DirectoryOrCreate
