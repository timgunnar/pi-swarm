apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pi-swarm
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: k3s-nodes
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: '(.+):.*'
            target_label: __address__
            replacement: '${1}:9100'

      - job_name: ollama
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - pi-swarm
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: ollama
            action: keep
          - source_labels: [__address__]
            regex: '(.+):.*'
            target_label: __address__
            replacement: '${1}:11434'
